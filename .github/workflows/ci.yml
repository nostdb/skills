# SPDX-License-Identifier: Apache-2.0
name: CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Skills
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostos-skills}
      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "${{ matrix.python }}"}
      - name: Compile Python
        working-directory: nostos-skills
        run: python3 -m compileall -q scripts adapters tests
      - name: Verify portable Skills
        working-directory: nostos-skills
        run: python3 scripts/verify_skills.py --format-check
      - name: Test helpers and adapters
        working-directory: nostos-skills
        run: python3 -m unittest discover -s tests -v

  core-equivalence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Skills
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostos-skills}
      - name: Check out CLI
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostos-cli, path: nostos-cli}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostos-core, path: nostos-core}
      - name: Build compatible CLI
        working-directory: nostos-cli
        run: cargo build --locked
      - name: Run adapter/Core equivalence fixture
        working-directory: nostos-skills
        env:
          NOSTOS_TEST_BIN: ../nostos-cli/target/debug/nostos
        run: python3 -m unittest discover -s tests -v
