# SPDX-License-Identifier: Apache-2.0
name: CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Skills
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with: {path: skills}
      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "${{ matrix.python }}"}
      - name: Compile Python
        working-directory: skills
        run: python3 -m compileall -q scripts skills adapters tests
      - name: Verify portable Skills
        working-directory: skills
        run: python3 scripts/verify_skills.py --format-check
      - name: Test helpers and adapters
        working-directory: skills
        run: python3 -m unittest discover -s tests -v

  core-equivalence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Skills
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with: {path: skills}
      - name: Check out CLI
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with: {repository: nostosdb/nostosdb-cli, path: nostosdb-cli}
      - name: Check out Core
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with: {repository: nostosdb/nostosdb-core, path: nostosdb-core}
      - name: Build compatible CLI
        working-directory: nostosdb-cli
        run: cargo build --locked
      - name: Run adapter/Core equivalence fixture
        working-directory: skills
        env:
          NOSTOS_TEST_BIN: ../nostosdb-cli/target/debug/nostos
        run: python3 -m unittest discover -s tests -v
